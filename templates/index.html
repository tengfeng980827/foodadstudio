<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>外卖生图</title>

  <link rel="stylesheet" href="/static/style.css" />
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#fff7ed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="外卖生图" />
</head>

<body>
  <div class="app-shell">

    <header class="app-header">
      <div>
        <h1>外卖生图</h1>
        <p>一键生成高转化外卖头图 / Banner</p>
      </div>
      <button class="member-btn">👑 开通会员</button>
    </header>

    <section class="hero-banner">
      <div class="hero-left">
        <h2><span>AI</span>生成外卖头图</h2>
        <p>输入资料，AI 帮你生成吸睛 Banner</p>
        <button id="goCreateBtn" class="hero-btn">✨ 开始生成</button>
      </div>

      <div class="hero-food-card">
        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=900&auto=format&fit=crop" alt="Food Banner" />
        <div class="hero-food-copy">
          <strong>大满足</strong>
          <span>双层牛肉堡</span>
          <em>¥19.9 起</em>
        </div>
      </div>
    </section>

    <section class="shortcut-card">
      <button data-tab="create">
        <span class="icon orange">🖼️</span>
        <strong>AI生图</strong>
        <small>智能生成</small>
      </button>

      <button data-tab="templates">
        <span class="icon purple">📚</span>
        <strong>模板中心</strong>
        <small>热门模板</small>
      </button>

      <button data-tab="create">
        <span class="icon green">✍️</span>
        <strong>智能文案</strong>
        <small>吸睛标题</small>
      </button>

      <button data-tab="sizes">
        <span class="icon blue">📐</span>
        <strong>尺寸设置</strong>
        <small>多平台适配</small>
      </button>

      <button data-tab="works">
        <span class="icon yellow">📁</span>
        <strong>我的作品</strong>
        <small>查看管理</small>
      </button>
    </section>

    <main class="screen active" id="homeScreen">
      <div class="section-headline">
        <div>
          <h3>热门模板</h3>
        </div>
        <button data-tab="templates">查看更多 ›</button>
      </div>

      <div class="template-scroll">
        <button class="mini-template" data-tab="create">
          <img src="https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=600&auto=format&fit=crop" alt="">
          <div>
            <strong>冬日热辣</strong>
            <span>火锅 · 促销</span>
          </div>
          <em>RM29.9</em>
        </button>

        <button class="mini-template" data-tab="create">
          <img src="https://images.unsplash.com/photo-1626645738196-c2a7c87a8f58?q=80&w=600&auto=format&fit=crop" alt="">
          <div>
            <strong>韩式炸鸡</strong>
            <span>小吃 · 招牌</span>
          </div>
          <em>RM22.8</em>
        </button>

        <button class="mini-template" data-tab="create">
          <img src="https://images.unsplash.com/photo-1622597467836-f3285f2131b8?q=80&w=600&auto=format&fit=crop" alt="">
          <div>
            <strong>鲜果茶</strong>
            <span>饮品 · 新品</span>
          </div>
          <em>RM12</em>
        </button>

        <button class="mini-template" data-tab="create">
          <img src="https://images.unsplash.com/photo-1579871494447-9811cf80d66c?q=80&w=600&auto=format&fit=crop" alt="">
          <div>
            <strong>匠心寿司</strong>
            <span>日料 · 品质</span>
          </div>
          <em>RM39</em>
        </button>
      </div>

      <div class="section-headline">
        <div>
          <h3>常用尺寸</h3>
        </div>
      </div>

      <div class="size-scroll">
        <button class="size-option selected" data-size="1080x1080">
          <strong>外卖头图</strong>
          <span>1080×1080px</span>
          <i>🖼️</i>
        </button>

        <button class="size-option" data-size="1080x600">
          <strong>外卖 Banner</strong>
          <span>1080×600px</span>
          <i>🌄</i>
        </button>

        <button class="size-option" data-size="1080x1080">
          <strong>产品图</strong>
          <span>1080×1080px</span>
          <i>🍱</i>
        </button>

        <button class="size-option" data-size="custom">
          <strong>自定义尺寸</strong>
          <span>自由大小</span>
          <i>📄</i>
        </button>
      </div>

      <div class="section-headline">
        <div>
          <h3>最近作品</h3>
        </div>
        <button data-tab="works">全部作品 ›</button>
      </div>

      <div id="homeWorksList" class="recent-grid">
        <div class="recent-card">
          <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=600&auto=format&fit=crop" alt="">
          <strong>双层牛肉堡头图</strong>
          <span>今天 14:30</span>
        </div>
        <div class="recent-card">
          <img src="https://images.unsplash.com/photo-1622597467836-f3285f2131b8?q=80&w=600&auto=format&fit=crop" alt="">
          <strong>鲜橙多多饮品图</strong>
          <span>今天 11:20</span>
        </div>
        <div class="recent-card">
          <img src="https://images.unsplash.com/photo-1529042410759-befb1204b468?q=80&w=600&auto=format&fit=crop" alt="">
          <strong>麻辣香锅头图</strong>
          <span>昨天 16:45</span>
        </div>
        <div class="recent-card">
          <img src="https://images.unsplash.com/photo-1579871494447-9811cf80d66c?q=80&w=600&auto=format&fit=crop" alt="">
          <strong>寿司头图设计</strong>
          <span>昨天 10:15</span>
        </div>
      </div>
    </main>

    <main class="screen" id="createScreen">
      <div class="page-title">
        <h2>新建画布</h2>
        <p>填写资料后，一键生成外卖头图</p>
      </div>

      <form id="generateForm" class="create-form">
        <label>
          选择尺寸
          <select id="canvasSize" name="size">
            <option value="1080x1080">Grab 头图 1080×1080</option>
            <option value="1080x1080">产品图 1080×1080</option>
            <option value="1080x600">Banner 1080×600</option>
          </select>
        </label>

        <label>
          主标题
          <input id="titleInput" name="title" placeholder="例如：超值套餐 / 新品上市" required />
        </label>

        <label>
          副标题，可选
          <input id="subtitleInput" name="subtitle" placeholder="例如：吃货必点 / 今日限定" />
        </label>

        <label>
          价格，可选
          <input id="priceInput" name="price" placeholder="例如：RM19.90 / ¥29.9" />
        </label>

        <label>
          Badge 标签，可选
          <input id="badgeInput" name="badge" placeholder="例如：Must Try / 限时优惠" />
        </label>

        <label>
          风格选择
          <select id="styleInput" name="style">
            <option value="auto">自动匹配风格</option>
            <option value="luxury">高级商业摄影风</option>
            <option value="hawker">马来西亚档口风</option>
            <option value="japanese">日式餐厅风</option>
            <option value="plain">简洁高级风</option>
          </select>
        </label>

        <label>
          上传食物图片
          <input id="foodImageInput" name="food_image" type="file" accept="image/*" required />
        </label>

        <label>
          上传 Logo，可选
          <input id="logoInput" name="logo" type="file" accept="image/*" />
        </label>

        <button type="submit" class="generate-btn">🚀 开始生成</button>
      </form>

      <section class="result-card" id="resultCard">
        <h3>生成结果</h3>
        <div id="loadingBox" class="loading-box hidden">AI 正在生成中...</div>
        <img id="resultImage" class="result-image hidden" />
        <a id="downloadBtn" class="download-btn hidden" download="banner.png">下载图片</a>
      </section>
    </main>

    <main class="screen" id="templatesScreen">
      <div class="page-title">
        <h2>模板中心</h2>
        <p>选择一个风格，快速开始设计</p>
      </div>

      <div class="template-board">
        <button class="large-template" data-tab="create">
          <img src="https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=900&auto=format&fit=crop" alt="">
          <strong>超值套餐</strong>
          <span>吃货必点</span>
        </button>

        <button class="large-template" data-tab="create">
          <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?q=80&w=900&auto=format&fit=crop" alt="">
          <strong>轻食沙拉</strong>
          <span>Fresh & Healthy</span>
        </button>

        <button class="large-template" data-tab="create">
          <img src="https://images.unsplash.com/photo-1626645738196-c2a7c87a8f58?q=80&w=900&auto=format&fit=crop" alt="">
          <strong>限时秒杀</strong>
          <span>仅限今日</span>
        </button>

        <button class="large-template" data-tab="create">
          <img src="https://images.unsplash.com/photo-1579871494447-9811cf80d66c?q=80&w=900&auto=format&fit=crop" alt="">
          <strong>匠心寿司</strong>
          <span>新鲜食材</span>
        </button>

        <button class="large-template" data-tab="create">
          <img src="https://images.unsplash.com/photo-1529042410759-befb1204b468?q=80&w=900&auto=format&fit=crop" alt="">
          <strong>麻辣香锅</strong>
          <span>超满足</span>
        </button>

        <button class="large-template" data-tab="create">
          <img src="https://images.unsplash.com/photo-1562967914-608f82629710?q=80&w=900&auto=format&fit=crop" alt="">
          <strong>新品上市</strong>
          <span>New Arrival</span>
        </button>
      </div>
    </main>

    <main class="screen" id="worksScreen">
      <div class="page-title">
        <h2>我的作品</h2>
        <p>最近生成的 Banner 会显示在这里</p>
      </div>

      <div id="worksList" class="works-list">
        <div class="empty-state">
          暂时还没有作品，先去生成第一张吧。
        </div>
      </div>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-tab="home">首页</button>
      <button class="nav-item" data-tab="templates">模板</button>
      <button class="nav-plus" data-tab="create">＋</button>
      <button class="nav-item" data-tab="works">作品</button>
      <button class="nav-item" data-tab="mine">我的</button>
    </nav>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
